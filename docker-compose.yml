services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:                  "postgresql://geolatent:geolatent@db:5432/geolatent"
      GEOLATENT_REDIS_URL:           "redis://redis:6379/0"
      GEOLATENT_JWT_SECRET:          "${GEOLATENT_JWT_SECRET}"
      GEOLATENT_AUDIT_SIGNING_KEY:   "${GEOLATENT_AUDIT_SIGNING_KEY}"
      GEOLATENT_BUNDLE_SECRET:       "${GEOLATENT_BUNDLE_SECRET}"
      # SECURITY: false in production. Set true only for local dev via .env
      GEOLATENT_ALLOW_HEADER_DEV:    "${GEOLATENT_ALLOW_HEADER_DEV:-false}"
      STRIPE_SECRET_KEY:             "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET:         "${STRIPE_WEBHOOK_SECRET:-}"
      ANTHROPIC_API_KEY:             "${ANTHROPIC_API_KEY:-}"
      GEOLATENT_OIDC_JWKS_URI:       "${GEOLATENT_OIDC_JWKS_URI:-}"
      DB_POOL_MAX:                   "10"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: >
      sh -c "alembic upgrade head && uvicorn geolatent.server:app --host 0.0.0.0 --port 8000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       geolatent
      POSTGRES_USER:     geolatent
      POSTGRES_PASSWORD: geolatent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geolatent"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
